<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="BYU-Idaho | Spring 2026 | WDD 131: Dynamic Web Development | Sister Julie Ann Anderson | Week 7 | Prove: Event Ticket Form">
    <meta name="author" content="Rebekah Harden">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket Form</title>
    <link rel="icon" href="images/favicon.png">
    <link rel="stylesheet" href="eventform.css">
    <script src="eventform.js" defer></script>
</head>
<body>
    <main class="wrapper">
        <h1>Event Ticket</h1>

        <form id="eventForm">
            <div class="field">
                <label for="firstName">First Name</label>
                <input 
                    type="text"
                    id="firstName" 
                    name="firstName" 
                    required 
                >
            </div>
            <div class="field">
                <label for="lastName">last Name</label>
                <input 
                    type="text"
                    id="lastName" 
                    name="lastName" 
                    required 
                >
            </div>
            <div class="field full">
                <label for="email">Email</label>
                <input 
                    type="email"
                    id="email" 
                    name="email" 
                    required 
                >
            </div>
            <div class="field">
                <label for="userType">Type</label>
                <select 
                    id="userType" 
                    name="userType" 
                    aria-controls="usertTypeContainer"
                    required 
                >
                    <option value="">Choose one</option>
                    <option value="student">Student</option>
                    <option value="guest">Guest</option>
                </select>
            </div>

            <div class="field">
                <label for="eventDate">Event Date</label>
                <input
                    type="date"
                    id="eventDate"
                    name="eventDate"
                    required
                >
            </div>
            <div id="usertTypeContainer" class="field full" hidden>
                <label for="studentId">Student ID#</label>
                <input
                    type="text"
                    id="studentId"
                    name="studentId"
                >
            </div>
            <div id="usertTypeContainer" class="field full" hidden>
                <label for="accessCode">Access Code</label>
                <input
                    type="text"
                    id="accessCode"
                    name="accessCode"
                >
            </div>

            <button class="full" type="submit">Create Ticket</button>

        </form>

        
    </main>
</body>
</html>
