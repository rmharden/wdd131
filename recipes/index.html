<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="BYU-Idaho | Spring 2026 | WDD 131: Dynamic Web Fundamentals | Sister Julie Ann Anderson | Unit 05 | W09 Prove: Recipe Book part 1">
    <meta name="author" content="Rebekah Harden">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="BYU-Idaho | Spring 2026 | WDD 131: Dynamic Web Fundamentals | Sister Julie Ann Anderson | Unit 05 | W09 Prove: Recipe Book part 1">
    <meta property="og:url" content="https://rmharden.github.io/wdd131/recipes/index.html">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="BYU-Idaho | Spring 2026 | WDD 131: Dynamic Web Fundamentals | Sister Julie Ann Anderson | Unit 05 | W09 Prove: Recipe Book part 1">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.png">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
                    
    <link rel="stylesheet" href="recipes.css">
</head>
<body>
    <div>
        <div class="logoTitle">
            <img src="images/recipe-book.png" alt="Recipe book logo" class="logo">
            <h1>RecipeBook</h1>
        </div>
        <form class="recipeSearch">
            <input 
                type="text"
                id="findRecipe"
                name="findRecipe"
                placeholder="Find a recipe "
            >
            <button type="submit">
                <span class="divider"></span>
                <img src="images/search.svg" alt="Submit">
            </button>
        </form>
        <hr>
        <section class="recipeCard">
            <img src="images/apple-crisp.jpeg" alt="Apple crisp and vanilla ice cream in a bowl" class="recipeImage">
            <div class="recipeType">
                <p>dessert</p>
            </div>
            <h2 class="recipeTitle">Apple Crisp</h2>
            
            <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
                >
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
                
            <p class="recipeDescription">This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
        </section>

        <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#">
            <img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#">
            <img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#">
            <img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                  
    <footer>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                           
    </footer>
</body>
</html>
