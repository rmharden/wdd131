<!DOCTYPE html>
<html lang="en">
<head>
        
    <meta charset="UTF-8">
    <meta name="description" content="This is a website that for searchable recipes.">
    <meta name="author" content="Rebekah Harden">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:type" content="Recipes">
    <meta property="og:title" content="Recipebook">
    <meta property="og:description" content="This is a website that for searchable recipes.">
    <meta property="og:url" content="rmharden.github.io/wdd131/recipes/index.html">

    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" defer href="recipes.css">
    <script src="recipes.js" defer></script>

    <title>Recipebook</title>
</head>
<body>
    <header>
        <img src="images/recipe-book.png" alt="An image of a recipe book">
        <h1>Recipebook</h1>
    </header>
    <main>
        <nav>
            <section class="errors"></section>
        <!--tutorial said that action doesn't go anywhere and to put a placeholder. Some with method-->
            <form id="checkoutForm" action="#" method="get">
                <label for="email"></label>
                <input type="email" id="email" name="email" placeholder="Find a recipe" required>
                </select>
                </p>

                <button type="submit">
                    <img src="images/search.svg" alt="magnifying glass">
                </button>
            </form>
        </nav>

        <div class="recipes">
            <div class="recipe-card">
                <img src="images/apple-crisp.jpg" alt="image of an apple crisp">
            </div>
        </div>
        <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star-empty">☆</span>
        </span>
                
    </main>
    <footer>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>

        <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                  
                
    </footer>
    
</body>
</html>
