<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="BYU-Idaho | Spring 2026 | WDD 131: Dynamic Web Fundamentals | Sister Julie Ann Anderson | Personal Project">
    <meta name="author" content="Rebekah Harden">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Planner</title>
    <link rel="icon" href="images/favicon.png">
    <link rel="stylesheet" href="fitness.css">
    <script src="fitness.js" defer></script>
</head>
<body>
    <main class="wrapper">
        <h1>Fitness Planner</h1>

        <div class="field">
          <label for="gender">Gender</label>
          <select
            id="gender"
            name="gender"
            aria-controls="gender"
            required
          >
            <option value="">Choose one</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
          </select>
        </div>

        <div class="field">
          <label for="age">Age Group</label>
          <select
            id="age"
            name="age"
            aria-controls="age"
            required
          >
            <option value="">Select Age</option>
            <option value="lessthan25">&lt;25</option>
            <option value="25-29">25-29</option>
            <option value="30-34">30-34</option>
            <option value="35-39">30-39</option>
            <option value="40-44">40-44</option>
            <option value="45-49">45-49</option>
            <option value="50-54">50-54</option>
            <option value="54-59">54-59</option>
            <option value="greaterthan60">&gt;60</option>
          </select>
        </div>
        <fieldset>
            <legend>Fitness Level</legend>
            <label><input type="checkbox" name="fitness-level" value="Begginner"/>Beginner</label>
            <label><input type="checkbox" name="fitness-level" value="Intermediate"/>Intermediate</label>
            <label><input type="checkbox" name="fitness-level" value="Advanced"/>Advanced</label>
        </fieldset>

        <fieldset>
            <legend>Today's Workout</legend>
            <label><input type="checkbox" name="exercise" value="Stretch or Cooldown"/>Stretch or Cooldown</label>
            <label><input type="checkbox" name="exercise" value="Calisthenics"/>Calisthenics</label>
            <label><input type="checkbox" name="exercise" value="5k Run"/>5k Run</label>
            <label><input type="checkbox" name="exercise" value="PT Test"/>PT Test</label>
        </fieldset>

    </main>
    
</body>
</html>
