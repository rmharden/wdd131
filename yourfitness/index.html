<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Your Fitness exercise generator app">
    <meta name="author" content="Rebekah Harden">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Fitness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Fitness">
    <meta property="og:description" content="Your Fitness exercise generator app">
    <meta property="og:url" content="https://rmharden.github.io/wdd131/yourfitness/index.html">
    <meta property="og:image" content="https://rmharden.github.io/wdd131/yourfitness/images/social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Your Fitness">
    <meta name="twitter:description" content="Your Fitness exercise generator app">
    <meta name="twitter:image" content="https://rmharden.github.io/wdd131/yourfitness/images/social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.png">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
     
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="styles/yourfitness.css">
    <script defer src="yourfitness.js"></script>
</head>  
<body>
    <header>
        <div class="logo-title">
            <h1>Your Fitness</h1>
            <img src="images/running.png" alt="Your fitness logo" class="logo">
        </div>
    </header>
    <main>
        <h2>Welcome to Your Fitness</h2>
        <p>Generate a workout plan based on your current fitness level.</p>
        <hr>
        <form id="workoutGenerator">
            <div class="generator">
                <h2>Today's Workout Generator</h2>
                <p>How many repetitions can you do without stopping?</p>
                <label for="repNumber">Starting Repetitions</label>
                <input id="repNumber" name="repNumber" type="number" placeholder="1-100" required>
                <div>
                    <button type="submit">Generate Workout</button>
                </div>
            </div>
        </form>
        <hr>
        <h2>Exercise Library</h2>
        <form class="exercise-search">
            <input 
                type="text"
                id="search"
                name="search"
                placeholder="Find an exercise"
            >
            <button type="submit">
                <span class="divider"></span>
                <img src="images/search.svg" alt="Submit">
            </button>
        </form>
        <!--template literal?-->
        <div class="exercise-container">

        </div>
    </main>               
    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#">
                <img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#">
                <img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#">
                <img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
        <div class="social-link">   
           <a href="https://www.flaticon.com/free-icons/fitness-forever" title="fitness forever icons">Fitness forever icons created by srip - Flaticon</a>                          
        </div> 
    </footer>
</body>
</html>
