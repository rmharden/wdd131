<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Rebekah Harden">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Snortleblat Character Card">
    <meta property="og:description" content="Swamp Beast Diplomat Character Card for WDD 131">

    <link rel="icon" href="/favicon.png">
    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>  
</head>
<body>
    <div class="card">
        <img class="image" src="snortleblat.png" alt="Snortleblat">
        <div class="name">Snortleblat</div>
        <div class="stats">
            <p><strong>Class: </strong>Swamp Beast Diplomat</p>
            <p><strong>Level: </strong> <span id="level">1</span></p>
            <p><strong>Health: </strong><span id="health">100</span> </p>  
        </div>
        <div class="buttons">
            <button id="attacked">Attacked</button>
            <button id="levelUp">Level Up</button>
        </div>
    </div>
</body>
