<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Character Card</title>
    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>

<body>
    <section class="card">
        <img class="image">
        <div class="name"></div>
        <div class="stats"></div>

            <button>Level Up</button>
